<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Jaimi's Life Hub</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Life Hub" />
<meta name="theme-color" content="#F7F3EC" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icons/icon-180.png" />
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F7F3EC; --card:#FFFFFF; --ink:#2B2722; --ink-soft:#6B655C; --ink-faint:#A39C90;
    --line:#E7E0D4; --coral:#E8927C; --mint:#7FB79B; --sunshine:#E6B855;
    --rail-w:210px; --tabbar-h:62px;
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}

  /* ---- frames ---- */
  .stage{position:fixed;top:0;right:0;bottom:calc(var(--tabbar-h) + var(--sab));left:0;background:var(--paper)}
  .stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--paper)}
  .stage iframe.active{display:block}
  .stage iframe#f-quest{background:#0b0716}

  /* ---- phone: bottom tab bar ---- */
  nav{
    position:fixed;left:0;right:0;bottom:0;height:calc(var(--tabbar-h) + var(--sab));
    padding:6px 10px calc(6px + var(--sab));
    background:rgba(252,250,245,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;gap:6px;z-index:10;
  }
  nav button{
    flex:1;border:0;background:transparent;font-family:inherit;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    border-radius:14px;color:var(--ink-faint);font-size:10.5px;font-weight:700;letter-spacing:.04em;
    transition:all .15s;padding:4px 0;
  }
  nav button .ico{font-size:21px;line-height:1;filter:grayscale(.85);opacity:.75;transition:all .15s}
  nav button.active{color:var(--ink);background:rgba(232,146,124,.13)}
  nav button.active .ico{filter:none;opacity:1;transform:scale(1.08)}

  /* ---- iPad / Mac: left rail ---- */
  @media (min-width:760px){
    .stage{top:0;bottom:0;left:var(--rail-w)}
    nav{
      top:0;bottom:0;left:0;right:auto;width:var(--rail-w);height:auto;
      flex-direction:column;justify-content:flex-start;gap:6px;
      padding:calc(20px + var(--sat)) 14px 20px;border-top:0;border-right:1px solid var(--line);
    }
    nav::before{
      content:"Jaimi's Life Hub";
      font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.01em;
      display:block;padding:6px 10px 18px;color:var(--ink);
    }
    nav button{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:11px;padding:12px 13px;font-size:14px;letter-spacing:0;border-radius:13px}
    nav button .ico{font-size:19px}
    nav .spacer{flex:1}
    nav .foot{font-size:11px;color:var(--ink-faint);padding:0 10px;line-height:1.5}
  }
  @media (max-width:759px){ nav .foot{display:none} nav .spacer{display:none} nav button.syncbtn{flex:.65} }

  /* ---- sync button + panel ---- */
  .syncbtn .dot{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--ink-faint);transition:background .3s}
  .syncbtn .dot.ok{background:var(--mint)}
  .syncbtn .dot.err{background:#C75B45}
  .syncbtn .dot.locked{background:var(--sunshine)}
  .syncbtn .dot.busy{background:var(--sunshine);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}
  .syncpanel{position:fixed;z-index:30;right:12px;bottom:calc(var(--tabbar-h) + var(--sab) + 10px);left:12px;max-width:430px;margin-left:auto;
    background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 40px rgba(43,39,34,.18);padding:20px}
  @media (min-width:760px){ .syncpanel{left:calc(var(--rail-w) + 14px);right:auto;bottom:14px;width:410px} }
  .syncpanel h2{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:8px}
  .syncpanel p{font-size:13px;color:var(--ink-soft);line-height:1.55;margin-bottom:10px}
  .syncpanel a{color:#2563eb;font-weight:600}
  .syncpanel input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-family:inherit;font-size:14px;background:var(--paper-2);outline:none}
  .syncpanel input:focus{border-color:var(--coral);box-shadow:0 0 0 3px rgba(232,146,124,.14)}
  .syncpanel .row{display:flex;gap:8px;margin-top:10px}
  .syncpanel .row button{flex:1;border:0;border-radius:11px;padding:11px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer}
  .syncpanel .primary{background:var(--ink);color:#fff}
  .syncpanel .soft{background:var(--line-soft);color:var(--ink)}
  .syncpanel .msg{font-size:12.5px;font-weight:600;margin-top:10px;min-height:16px}
  .syncpanel .msg.bad{color:#C75B45}
  .syncpanel .msg.good{color:#5E9277}
</style>
</head>
<body>
  <div class="stage">
    <iframe id="f-hub" title="Life Hub"></iframe>
    <iframe id="f-quest" title="Night Court Questkeeper"></iframe>
    <iframe id="f-course" title="Brain — mental health"></iframe>
    <iframe id="f-finance" title="Money"></iframe>
    <iframe id="f-kitchen" title="Kitchen"></iframe>
    <iframe id="f-home" title="Home"></iframe>
  </div>

  <nav>
    <button id="b-hub" onclick="show('hub')"><span class="ico">🏡</span><span>Life Hub</span></button>
    <button id="b-quest" onclick="show('quest')"><span class="ico">🌙</span><span>Quests</span></button>
    <button id="b-course" onclick="show('course')"><span class="ico">🧠</span><span>Brain</span></button>
    <button id="b-finance" onclick="show('finance')"><span class="ico">💰</span><span>Money</span></button>
    <button id="b-kitchen" onclick="show('kitchen')"><span class="ico">🍳</span><span>Kitchen</span></button>
    <button id="b-home" onclick="show('home')"><span class="ico">🏠</span><span>Home</span></button>
    <button id="b-sync" class="syncbtn" onclick="toggleSync()"><span class="ico"><span class="dot" id="syncDot"></span></span><span>Sync</span></button>
    <span class="spacer"></span>
    <span class="foot">One calm place for everything.<br>Ask Claude to “refresh my hub” for fresh data.</span>
  </nav>

  <div class="syncpanel" id="syncPanel" hidden>
    <h2>🔄 Device sync</h2>
    <div id="syncBody"></div>
    <div class="msg" id="syncMsg"></div>
  </div>

<script>
  const SRC = { hub:'./hub/index.html', quest:'./quest/index.html', course:'./course/index.html', finance:'./finance/index.html', kitchen:'./kitchen/index.html', home:'./home/index.html' };
  function show(which){
    for (const k of Object.keys(SRC)){
      const f = document.getElementById('f-'+k), b = document.getElementById('b-'+k);
      const on = k === which;
      if (on && !f.src) f.src = SRC[k];          // lazy-load each section once
      f.classList.toggle('active', on);
      b.classList.toggle('active', on);
    }
    try { localStorage.setItem('lifehub_tab', which); } catch(e){}
    document.querySelector('meta[name=theme-color]').content = which === 'quest' ? '#0b0716' : '#F7F3EC';
  }
  // wait for the sync engine's first pull (or its ready signal) so sections open on fresh data
  let booted = false;
  const boot = () => { if (booted) return; booted = true; show(localStorage.getItem('lifehub_tab') || 'hub'); };
  window.addEventListener('lifehub-sync-ready', boot, { once: true });
  setTimeout(boot, 7000);

  /* ---- sync panel ---- */
  function toggleSync(){
    const p = document.getElementById('syncPanel');
    p.hidden = !p.hidden;
    if (!p.hidden) renderSync();
  }
  function renderSync(){
    const s = LifeHubSync.state();
    const body = document.getElementById('syncBody');
    if (!s.on){
      body.innerHTML = `
        <p><b>Keep iPhone, iPad &amp; Mac in step.</b> Quest progress, course answers and cleaning-schedule edits sync through your own GitHub account — encrypted with your passcode before they leave the device, so GitHub only ever stores scrambled text.</p>
        <p>One-time setup on each device: <a href="https://github.com/settings/tokens/new?scopes=gist&description=Life%20Hub%20sync" target="_blank" rel="noopener">tap here to create your sync token</a> (everything's pre-filled — just press the green <b>Generate token</b> button at the bottom), copy the code it shows, and paste it below.</p>
        <input id="tokIn" type="password" placeholder="Paste token here (ghp_…)" autocomplete="off" />
        <div class="row"><button class="primary" onclick="connectSync()">Turn on sync</button></div>`;
    } else {
      const last = s.last ? new Date(s.last).toLocaleString('en-AU',{hour:'numeric',minute:'2-digit',day:'numeric',month:'short'}) : 'not yet';
      const line = s.status==='err' ? '⚠️ ' + (s.detail || 'Sync problem — will retry.') :
                   s.status==='locked' ? '🔒 Unlock the Life Hub tab once on this device, then sync can run.' :
                   s.status==='busy' ? 'Syncing…' : '✓ Sync is on. Last synced: ' + last + '.';
      body.innerHTML = `
        <p>${line}</p>
        <div class="row">
          <button class="primary" onclick="LifeHubSync.syncNow()">Sync now</button>
          <button class="soft" onclick="if(confirm('Turn sync off on this device? Nothing is deleted — this device just stops syncing.')){LifeHubSync.disconnect();renderSync();}">Turn off</button>
        </div>`;
    }
    document.getElementById('syncMsg').textContent = '';
  }
  async function connectSync(){
    const msg = document.getElementById('syncMsg');
    msg.className = 'msg'; msg.textContent = 'Connecting…';
    try {
      await LifeHubSync.connect(document.getElementById('tokIn').value);
      renderSync();
      msg.className = 'msg good'; msg.textContent = 'Connected — this device now syncs ✓';
    } catch(e){
      msg.className = 'msg bad'; msg.textContent = e.message;
    }
  }
  document.addEventListener('lifehub-sync-state', (e) => {
    const d = document.getElementById('syncDot');
    d.className = 'dot ' + ({ok:'ok', err:'err', busy:'busy', locked:'locked'}[e.detail.status] || '');
    const p = document.getElementById('syncPanel');
    if (!p.hidden && e.detail.status !== 'busy') renderSync();
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
<script src="./sync.js"></script>
</body>
</html>
